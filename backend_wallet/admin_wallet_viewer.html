<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Wallet Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <h1 class="mb-4">
                    <i class="fas fa-wallet me-2"></i>
                    Admin Wallet Management
                </h1>
            </div>
        </div>

        <!-- Login Section -->
        <div id="loginSection" class="row mb-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="fas fa-sign-in-alt me-2"></i>
                            Admin Login
                        </h5>
                    </div>
                    <div class="card-body">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" value="admin@example.com" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" value="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-sign-in-alt me-2"></i>
                                Login
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Wallet Data Section -->
        <div id="walletSection" style="display: none;">
            <div class="row mb-3">
                <div class="col-12">
                    <div class="btn-group" role="group">
                        <button type="button" class="btn btn-outline-primary" onclick="fetchMyWallets()">
                            <i class="fas fa-user me-2"></i>
                            My Wallets
                        </button>
                        <button type="button" class="btn btn-outline-info" onclick="fetchAllWallets()">
                            <i class="fas fa-users me-2"></i>
                            All Wallets
                        </button>
                        <button type="button" class="btn btn-outline-success" onclick="fetchDashboard()">
                            <i class="fas fa-tachometer-alt me-2"></i>
                            Dashboard
                        </button>
                        <button type="button" class="btn btn-outline-warning" onclick="fetchUsers()">
                            <i class="fas fa-user-friends me-2"></i>
                            Users
                        </button>
                        <button type="button" class="btn btn-outline-danger" onclick="fetchTransactions()">
                            <i class="fas fa-exchange-alt me-2"></i>
                            Transactions
                        </button>
                    </div>
                </div>
            </div>

            <!-- Data Display -->
            <div id="dataDisplay" class="row">
                <div class="col-12">
                    <div id="loadingSpinner" class="text-center" style="display: none;">
                        <div class="spinner-border" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                    <div id="dataContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let authToken = '';

        // Login functionality
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('http://127.0.0.1:8000/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    authToken = data.token;
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('walletSection').style.display = 'block';
                    
                    // Auto-fetch my wallets
                    fetchMyWallets();
                } else {
                    alert('Login failed: ' + (data.message || 'Unknown error'));
                }
            } catch (error) {
                alert('Login error: ' + error.message);
            }
        });

        // API fetch functions
        async function fetchData(endpoint, title) {
            showLoading(true);
            try {
                const response = await fetch(`http://127.0.0.1:8000/api/${endpoint}`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Accept': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    displayData(data, title);
                } else {
                    displayError(data.message || 'Failed to fetch data');
                }
            } catch (error) {
                displayError('Network error: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        function fetchMyWallets() {
            fetchData('wallets', 'My Wallets');
        }

        function fetchAllWallets() {
            fetchData('admin/wallets', 'All Users Wallets');
        }

        function fetchDashboard() {
            fetchData('admin/dashboard', 'Admin Dashboard');
        }

        function fetchUsers() {
            fetchData('admin/users', 'All Users');
        }

        function fetchTransactions() {
            fetchData('admin/transactions', 'All Transactions');
        }

        function showLoading(show) {
            document.getElementById('loadingSpinner').style.display = show ? 'block' : 'none';
            document.getElementById('dataContent').style.display = show ? 'none' : 'block';
        }

        function displayData(data, title) {
            const content = document.getElementById('dataContent');
            
            if (Array.isArray(data)) {
                // Display as table
                let html = `<h3 class="mb-3">${title}</h3>`;
                html += '<div class="table-responsive"><table class="table table-striped table-hover">';
                
                if (data.length > 0) {
                    // Headers
                    html += '<thead><tr>';
                    Object.keys(data[0]).forEach(key => {
                        html += `<th>${key}</th>`;
                    });
                    html += '</tr></thead>';
                    
                    // Rows
                    html += '<tbody>';
                    data.forEach(item => {
                        html += '<tr>';
                        Object.values(item).forEach(value => {
                            html += `<td>${JSON.stringify(value)}</td>`;
                        });
                        html += '</tr>';
                    });
                    html += '</tbody>';
                } else {
                    html += '<tbody><tr><td colspan="100%">No data found</td></tr></tbody>';
                }
                
                html += '</table></div>';
                html += `<div class="alert alert-info">Total records: ${data.length}</div>`;
                content.innerHTML = html;
            } else {
                // Display as JSON
                content.innerHTML = `
                    <h3 class="mb-3">${title}</h3>
                    <pre class="bg-light p-3 rounded">${JSON.stringify(data, null, 2)}</pre>
                `;
            }
        }

        function displayError(message) {
            document.getElementById('dataContent').innerHTML = `
                <div class="alert alert-danger">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    Error: ${message}
                </div>
            `;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Test Login</title>
</head>
<body>
    <h1>Test Login API</h1>
    <button onclick="testLogin()">Test Login</button>
    <button onclick="testWallets()">Test Wallets</button>
    <div id="result"></div>

    <script>
        let authToken = '';

        async function testLogin() {
            try {
                const response = await fetch('http://localhost:8000/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: 'password123'
                    })
                });
                
                const data = await response.json();
                
                if (data.token) {
                    authToken = data.token;
                    localStorage.setItem('token', authToken);
                }
                
                document.getElementById('result').innerHTML = `
                    <h3>Login Response:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h3>Error:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }

        async function testWallets() {
            try {
                const token = localStorage.getItem('token') || authToken;
                
                if (!token) {
                    document.getElementById('result').innerHTML = `
                        <h3>Error:</h3>
                        <pre>No authentication token found. Please login first.</pre>
                    `;
                    return;
                }

                const response = await fetch('http://localhost:8000/api/wallets', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                const data = await response.json();
                
                document.getElementById('result').innerHTML = `
                    <h3>Wallets Response:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h3>Error:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        }
    </script>
</body>
</html>

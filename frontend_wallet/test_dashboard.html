<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>Dashboard Access Test</h1>
        
        <div class="mb-3">
            <h3>Step 1: Login</h3>
            <button onclick="testLogin()" class="btn btn-primary">Test Login</button>
            <div id="loginResult"></div>
        </div>
        
        <div class="mb-3">
            <h3>Step 2: Check Dashboard Access</h3>
            <button onclick="testDashboard()" class="btn btn-success">Test Dashboard</button>
            <div id="dashboardResult"></div>
        </div>
        
        <div class="mb-3">
            <h3>Step 3: Check Token Storage</h3>
            <button onclick="checkToken()" class="btn btn-info">Check Token</button>
            <div id="tokenResult"></div>
        </div>
    </div>

    <script>
        async function testLogin() {
            try {
                const response = await fetch('http://localhost:8000/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'admin@example.com',
                        password: 'password'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    document.getElementById('loginResult').innerHTML = 
                        `<div class="alert alert-success">✅ Login successful! Token: ${data.token.substring(0, 20)}...</div>`;
                } else {
                    document.getElementById('loginResult').innerHTML = 
                        `<div class="alert alert-danger">❌ Login failed: ${data.message || 'Unknown error'}</div>`;
                }
            } catch (error) {
                document.getElementById('loginResult').innerHTML = 
                    `<div class="alert alert-danger">❌ Error: ${error.message}</div>`;
            }
        }
        
        async function testDashboard() {
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    document.getElementById('dashboardResult').innerHTML = 
                        `<div class="alert alert-warning">⚠️ No token found. Please login first.</div>`;
                    return;
                }
                
                const response = await fetch('http://localhost:8000/api/wallets', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('dashboardResult').innerHTML = 
                        `<div class="alert alert-success">✅ Dashboard access successful! Found ${data.length} wallets.</div>`;
                } else {
                    const error = await response.json();
                    document.getElementById('dashboardResult').innerHTML = 
                        `<div class="alert alert-danger">❌ Dashboard access failed: ${error.message || 'Unauthorized'}</div>`;
                }
            } catch (error) {
                document.getElementById('dashboardResult').innerHTML = 
                    `<div class="alert alert-danger">❌ Error: ${error.message}</div>`;
            }
        }
        
        function checkToken() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            document.getElementById('tokenResult').innerHTML = `
                <div class="card">
                    <div class="card-body">
                        <h6>Token Status:</h6>
                        <p><strong>Token:</strong> ${token ? '✅ Found' : '❌ Not found'}</p>
                        <p><strong>User:</strong> ${user ? '✅ Found' : '❌ Not found'}</p>
                        ${token ? `<p><strong>Token Preview:</strong> ${token.substring(0, 50)}...</p>` : ''}
                        ${user ? `<p><strong>User Role:</strong> ${JSON.parse(user).role}</p>` : ''}
                    </div>
                </div>
            `;
        }
        
        // Auto-check on load
        checkToken();
    </script>
</body>
</html>

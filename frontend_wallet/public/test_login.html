<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login - Wallet System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h4>🔐 Test Login</h4>
                    </div>
                    <div class="card-body">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" value="test@example.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" value="password123" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Login</button>
                        </form>
                        <hr>
                        <div id="result" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const api = axios.create({
            baseURL: 'http://127.0.0.1:8000/api',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            try {
                console.log('Attempting login...');
                
                const response = await api.post('/login', {
                    email: email,
                    password: password
                });
                
                console.log('Login response:', response.data);
                
                if (response.data.token) {
                    // Store token
                    localStorage.setItem('token', response.data.token);
                    localStorage.setItem('user', JSON.stringify(response.data.user));
                    
                    resultDiv.innerHTML = `
                        <div class="alert alert-success">
                            <h6>✅ Login Successful!</h6>
                            <p><strong>Token:</strong> ${response.data.token.substring(0, 50)}...</p>
                            <p><strong>User:</strong> ${response.data.user.name}</p>
                            <button class="btn btn-sm btn-success" onclick="testWallets()">Test Wallet Access</button>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="alert alert-danger">
                            <h6>❌ Login Failed</h6>
                            <p>${response.data.message || 'Unknown error'}</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Login error:', error);
                resultDiv.innerHTML = `
                    <div class="alert alert-danger">
                        <h6>❌ Login Error</h6>
                        <p>${error.response?.data?.message || error.message}</p>
                        <p><strong>Status:</strong> ${error.response?.status}</p>
                    </div>
                `;
            }
        });
        
        async function testWallets() {
            const token = localStorage.getItem('token');
            const resultDiv = document.getElementById('result');
            
            try {
                console.log('Testing wallet access...');
                
                const response = await api.get('/wallets', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                console.log('Wallets response:', response.data);
                
                resultDiv.innerHTML = `
                    <div class="alert alert-success">
                        <h6>✅ Wallet Access Successful!</h6>
                        <p><strong>Wallets Found:</strong> ${response.data.length}</p>
                        <div class="mt-2">
                            ${response.data.map(wallet => `
                                <div class="border p-2 mb-2">
                                    <strong>${wallet.name}</strong> - ₹${parseFloat(wallet.balance).toFixed(2)}
                                    <br><small>Type: ${wallet.type} | Frozen: ${wallet.is_frozen ? 'Yes' : 'No'}</small>
                                </div>
                            `).join('')}
                        </div>
                        <button class="btn btn-primary mt-2" onclick="window.open('http://localhost:5173/dashboard', '_blank')">Open Dashboard</button>
                    </div>
                `;
            } catch (error) {
                console.error('Wallet access error:', error);
                resultDiv.innerHTML = `
                    <div class="alert alert-danger">
                        <h6>❌ Wallet Access Failed</h6>
                        <p>${error.response?.data?.message || error.message}</p>
                        <p><strong>Status:</strong> ${error.response?.status}</p>
                        <p><strong>Token:</strong> ${token ? token.substring(0, 50) + '...' : 'No token found'}</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>

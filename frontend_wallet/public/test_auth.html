<!DOCTYPE html>
<html>
<head>
    <title>Authentication Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { padding: 10px 20px; margin: 5px; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Wallet System Authentication Test</h1>
    
    <div>
        <button onclick="testLogin()">Test Login</button>
        <button onclick="testWallets()">Test Wallets</button>
        <button onclick="clearStorage()">Clear Storage</button>
    </div>
    
    <div id="result"></div>

    <script>
        async function testLogin() {
            try {
                const response = await fetch('http://localhost:8000/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: 'password123'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    document.getElementById('result').innerHTML = `
                        <div class="success">
                            <h3>✅ Login Successful!</h3>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    document.getElementById('result').innerHTML = `
                        <div class="error">
                            <h3>❌ Login Failed</h3>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <div class="error">
                        <h3>❌ Network Error</h3>
                        <pre>${error.message}</pre>
                    </div>
                `;
            }
        }

        async function testWallets() {
            try {
                const token = localStorage.getItem('token');
                
                if (!token) {
                    document.getElementById('result').innerHTML = `
                        <div class="error">
                            <h3>❌ No Authentication Token</h3>
                            <p>Please login first to get a token.</p>
                        </div>
                    `;
                    return;
                }

                const response = await fetch('http://localhost:8000/api/wallets', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('result').innerHTML = `
                        <div class="success">
                            <h3>✅ Wallets Retrieved Successfully!</h3>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    document.getElementById('result').innerHTML = `
                        <div class="error">
                            <h3>❌ Wallets Request Failed</h3>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <div class="error">
                        <h3>❌ Network Error</h3>
                        <pre>${error.message}</pre>
                    </div>
                `;
            }
        }

        function clearStorage() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            document.getElementById('result').innerHTML = `
                <div class="success">
                    <h3>✅ Storage Cleared</h3>
                    <p>Authentication tokens have been removed from localStorage.</p>
                </div>
            `;
        }

        // Check if already authenticated
        window.onload = function() {
            const token = localStorage.getItem('token');
            if (token) {
                document.getElementById('result').innerHTML = `
                    <div class="success">
                        <h3>✅ Already Authenticated</h3>
                        <p>Token found in localStorage. You can test the wallets endpoint.</p>
                    </div>
                `;
            }
        };
    </script>
</body>
</html>
